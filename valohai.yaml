- step:
    name: preprocess
    image: docker.io/yourdocker/titanic-ml
    command:
      - python src/preprocess.py
    outputs:
      - name: processed-data
        path: processed.csv

- step:
    name: train
    image: docker.io/yourdocker/titanic-ml
    command:
      - python src/train.py
    inputs:
      - name: processed-data
    outputs:
      - name: trained-model
        path: model.joblib

- step:
    name: evaluate
    image: docker.io/yourdocker/titanic-ml
    command:
      - python src/evaluate.py
    inputs:
      - name: processed-data
      - name: trained-model

- pipeline:
    name: training-pipeline
    nodes:
      - name: preprocess
        type: execution
        step: preprocess

      - name: train
        type: execution
        step: train
        override:
          inputs:
            - name: processed-data

      - name: evaluate
        type: execution
        step: evaluate
        override:
          inputs:
            - name: processed-data
            - name: trained-model

    edges:
      - [preprocess.output.processed.csv, train.input.processed-data]
      - [preprocess.output.processed.csv, evaluate.input.processed-data]
      - [train.output.model.joblib, evaluate.input.trained-model]
